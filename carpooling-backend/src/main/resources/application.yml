spring:
  application:
    name: carpooling-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/carpool_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:AaiBaba@01}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  security:
    filter:
      order: 10

  # ─── Mail (SMTP) ──────────────────────────────────────────────────────────
  # Gmail: enable 2-Step Verification, then create an App Password at
  # https://myaccount.google.com/apppasswords and put the 16-char value in MAIL_PASSWORD.
  # SendGrid: host=smtp.sendgrid.net, port=587, username=apikey, password=<API_KEY>.
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:waypointcarpool@gmail.com}        # <-- UPDATE: your full sender email
    password: ${MAIL_PASSWORD:rdym vxqc ounw fcde}        # <-- UPDATE: app password / API key
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        transport:
          protocol: smtp

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

server:
  port: 8081
  servlet:
    context-path: /api

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration-ms: 86400000   # 24 hours

razorpay:
  key-id: ${RAZORPAY_KEY_ID:}
  key-secret: ${RAZORPAY_KEY_SECRET:}

app:
  upload:
    dir: uploads
  email:
    from: ${MAIL_FROM:no-reply@waypoint.local}   # <-- UPDATE: from address shown to users
    from-name: ${MAIL_FROM_NAME:Waypoint}
  otp:
    length: 6
    expiry-minutes: 10
    max-attempts: 5
    cooldown-seconds: 60

logging:
  level:
    com.carpooling: DEBUG
    org.hibernate.SQL: WARN
